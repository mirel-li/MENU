<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENU</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf5ee;
      font-family: 'Bebas Neue', Impact, sans-serif;
      padding: clamp(1.5rem, 5vw, 4rem) clamp(1.2rem, 6vw, 5rem);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 3.5rem;
      padding-bottom: 2rem;
      border-bottom: 3px solid #2c1a0e;
    }
    .header h1 {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(5rem, 18vw, 10rem);
      letter-spacing: 0.05em;
      color: #2c1a0e;
      line-height: 1;
      font-weight: 400;
    }

    /* WRAPPER */
    .menu-wrap {
      max-width: 780px;
      margin: 0 auto;
    }

    /* CATEGORY */
    .category {
      margin-bottom: 2.5rem;
      border-top: 2px solid #2c1a0e;
      padding-top: 1.5rem;
    }

    .category-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }
    .category-toggle:focus { outline: none; }

    .category-title {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.12em;
      color: #2c1a0e;
      font-weight: 400;
    }

    .category-icon {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 1.4rem;
      color: #8b5e3c;
      display: inline-block;
      transition: transform 0.35s ease;
      line-height: 1;
    }
    .category-icon.open { transform: rotate(45deg); }

    /* ITEMS LIST */
    .items-list {
      display: none;
      margin-top: 1.2rem;
      padding-left: 1rem;
      border-left: 1.5px solid #c9a882;
    }
    .items-list.open { display: block; }

    /* ITEM */
    .item { margin-bottom: 0.3rem; }

    .item-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.55rem 0.8rem;
      text-align: left;
      border-radius: 3px;
      transition: background 0.2s;
    }
    .item-toggle:focus { outline: none; }
    .item-toggle:hover { background: #f0e4d4; }
    .item-toggle.active { background: #ede0d0; }

    .item-name {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      letter-spacing: 0.08em;
      color: #2c1a0e;
      font-weight: 400;
    }

    /* DETAIL CARD */
    .item-detail {
      display: none;
      margin: 0.4rem 0.8rem 0.8rem 0.8rem;
      padding: 1rem 1.2rem;
      background: #f5ece0;
      border-left: 3px solid #8b5e3c;
      border-radius: 2px;
    }
    .item-detail.open { display: block; }

    /* IMAGE ZONE */
    .img-zone { margin-bottom: 1rem; }

    .img-upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 120px;
      border: 1.5px dashed #c9a882;
      border-radius: 3px;
      cursor: pointer;
      gap: 0.4rem;
      background: #faf5ee;
      transition: background 0.2s;
    }
    .img-upload-label:hover { background: #f0e4d4; }

    .img-upload-icon {
      font-size: 1.6rem;
      color: #c9a882;
    }

    .img-upload-text {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      color: #a07850;
    }

    .img-preview-wrap {
      position: relative;
      width: 100%;
      display: none;
    }
    .img-preview-wrap.has-image { display: block; }

    .img-preview {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 3px;
      display: block;
    }

    .img-replace-label {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(44, 26, 14, 0.7);
      color: #faf5ee;
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 2px;
      cursor: pointer;
    }
    .img-replace-label:hover { background: rgba(44, 26, 14, 0.9); }

    input[type="file"] { display: none; }

    /* DESCRIPTION / INGREDIENTS */
    .field-label {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: #8b5e3c;
      display: block;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
    }

    .field-desc {
      margin-bottom: 0.7rem;
    }

    .field-text-desc {
      font-family: Georgia, serif;
      font-size: 0.88rem;
      color: #3d2010;
      line-height: 1.6;
      font-style: italic;
    }

    .field-text-ing {
      font-family: Georgia, serif;
      font-size: 0.85rem;
      color: #3d2010;
      line-height: 1.6;
    }
  </style>
</head>

          { name: "КАНАПЕ С ВЕТЧИНОЙ И СЫРОМ", desc: "Изысканные канапе с нежной ветчиной и сыром", ingredients: "Хлеб, ветчина, сыр, зелень, горчица или майонез" },
          { name: "КАНАПЕ С КУРИЦЕЙ И ГРИБАМИ", desc: "Ароматные канапе с куриным филе и грибами", ingredients: "Хлеб, куриное филе, шампиньоны, сыр, зелень, соус" },
          { name: "КАНАПЕ КУРИЦА И 4 СЫРА", desc: "Изысканные канапе с курицей и смесью четырёх сыров", ingredients: "Хлеб, курица, моцарелла, пармезан, гауда, дор блю" },
          { name: "БРУСКЕТТА С ЛОСОСЕМ/ГОВЯДИНОЙ", desc: "Итальянские брускетты с лососем или говядиной на гриле", ingredients: "Чиабатта, лосось или говядина, помидоры, руккола, оливковое масло, каперсы" },
          { name: "ГОРЯЧИЕ БУТЕРБРОДЫ", desc: "Горячие бутерброды с сыром и начинкой на выбор", ingredients: "Хлеб, сыр, ветчина или курица, томаты, масло, специи" },
          { name: "СЕНДВИЧ КЛАССИЧЕСКИЙ/ГОРЯЧИЙ/С ТУНЦОМ", desc: "Сэндвич в трёх вариантах: классический, горячий или с тунцом", ingredients: "Хлеб, начинка (ветчина/курица/тунец), листья салата, помидоры, соус" },
          { name: "КУРИНЫЕ СТРИПСЫ/ПОПКОРН", desc: "Хрустящие куриные кусочки в золотистой панировке", ingredients: "Куриное филе, яйца, панировочные сухари, специи, масло для жарки" },
          { name: "ХОТ-ДОГИ КЛАССИЧЕСКИЕ/С КУКУРУЗОЙ", desc: "Классические хот-доги или в кукурузном тесте", ingredients: "Сосиска, булочка, горчица, кетчуп, лук, кукурузное тесто (опц.)" },
          { name: "СУШИ-ТОРТ", desc: "Торт в стиле суши с рисом, рыбой и авокадо", ingredients: "Рис, лосось, авокадо, огурцы, нори, сливочный сыр, кунжут" },
          { name: "СУШИ ШАРИКИ", desc: "Компактные шарики суши с различными начинками", ingredients: "Рис для суши, лосось/тунец, авокадо, нори, кунжут, соевый соус" },
          { name: "ПАШТЕТ", desc: "Нежный домашний паштет из куриной печени с травами", ingredients: "Куриная печень, сливочное масло, лук, коньяк, тимьян, специи" },
        ]
      },
      {
        id: "sauces", title: "СОУСЫ",
        items: [
          { name: "ЦЕЗАРЬ", desc: "Классический сливочный соус цезарь с анчоусами", ingredients: "Анчоусы, чеснок, лимонный сок, пармезан, яичный желток, масло, горчица" },
          { name: "ЧЕСНОЧНЫЙ", desc: "Насыщенный чесночный соус на основе сметаны", ingredients: "Сметана или майонез, чеснок, укроп, соль, лимонный сок" },
          { name: "КАРТОФЕЛЬНЫЙ", desc: "Необычный пикантный соус на основе картофеля", ingredients: "Картофель, чеснок, оливковое масло, лимон, специи, зелень" },
          { name: "РАНЧ", desc: "Американский соус ранч с пахтой и травами", ingredients: "Пахта, майонез, сметана, укроп, петрушка, чеснок, лук, специи" },
        ]
      }
    ];

    const root = document.getElementById('menu-root');

    menuData.forEach(cat => {
      const catDiv = document.createElement('div');
      catDiv.className = 'category';

      // Category toggle button
      const catBtn = document.createElement('button');
      catBtn.className = 'category-toggle';
      catBtn.innerHTML = `
        <span class="category-title">${cat.title}</span>
        <span class="category-icon" id="icon-${cat.id}">+</span>
      `;
      catDiv.appendChild(catBtn);

      // Items list
      const itemsList = document.createElement('div');
      itemsList.className = 'items-list';
      itemsList.id = `list-${cat.id}`;

      cat.items.forEach((item, idx) => {
        const itemId = `${cat.id}-${idx}`;
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';

        // Item toggle
        const itemBtn = document.createElement('button');
        itemBtn.className = 'item-toggle';
        itemBtn.id = `btn-${itemId}`;
        itemBtn.innerHTML = `<span class="item-name">${item.name}</span>`;
        itemDiv.appendChild(itemBtn);

        // Detail card
        const detail = document.createElement('div');
        detail.className = 'item-detail';
        detail.id = `detail-${itemId}`;

        detail.innerHTML = `
          <div class="img-zone">
            <label class="img-upload-label" for="file-${itemId}" id="label-${itemId}">
              <span class="img-upload-icon">＋</span>
              <span class="img-upload-text">ДОБАВИТЬ ФОТО</span>
            </label>
            <div class="img-preview-wrap" id="preview-wrap-${itemId}">
              <img class="img-preview" id="preview-${itemId}" src="" alt="${item.name}" />
              <label class="img-replace-label" for="file-${itemId}">ЗАМЕНИТЬ</label>
            </div>
            <input type="file" accept="image/*" id="file-${itemId}" />
          </div>
          <div class="field-desc">
            <span class="field-label">ОПИСАНИЕ</span>
            <span class="field-text-desc">${item.desc}</span>
          </div>
          <div>
            <span class="field-label">ИНГРЕДИЕНТЫ</span>
            <span class="field-text-ing">${item.ingredients}</span>
          </div>
        `;

        itemDiv.appendChild(detail);
        itemsList.appendChild(itemDiv);

        // Item toggle click
        itemBtn.addEventListener('click', () => {
          const isOpen = detail.classList.contains('open');
          // Close all items in this category
          itemsList.querySelectorAll('.item-detail').forEach(d => d.classList.remove('open'));
          itemsList.querySelectorAll('.item-toggle').forEach(b => b.classList.remove('active'));
          if (!isOpen) {
            detail.classList.add('open');
            itemBtn.classList.add('active');
          }
        });

        // Image upload
        const fileInput = detail.querySelector(`#file-${itemId}`);
        const previewWrap = detail.querySelector(`#preview-wrap-${itemId}`);
        const previewImg = detail.querySelector(`#preview-${itemId}`);
        const uploadLabel = detail.querySelector(`#label-${itemId}`);

        fileInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const url = URL.createObjectURL(file);
          previewImg.src = url;
          previewWrap.classList.add('has-image');
          uploadLabel.style.display = 'none';
        });
      });

      catDiv.appendChild(itemsList);

      // Category toggle click
      catBtn.addEventListener('click', () => {
        const isOpen = itemsList.classList.contains('open');
        const icon = document.getElementById(`icon-${cat.id}`);
        itemsList.classList.toggle('open', !isOpen);
        icon.classList.toggle('open', !isOpen);
        if (isOpen) {
          // Close all items
          itemsList.querySelectorAll('.item-detail').forEach(d => d.classList.remove('open'));
          itemsList.querySelectorAll('.item-toggle').forEach(b => b.classList.remove('active'));
        }
      });

      root.appendChild(catDiv);
    });
  </script>
</body>
</html>
